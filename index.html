*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

@keyframes bounceUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes toastIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spinAnim{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

<script>
const {useState,useEffect,useRef,useCallback,useMemo}=React;
const h=React.createElement;

const SERVICE_UUID='6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const TX_UUID='6e400002-b5a3-f393-e0a9-e50e24dcca9e';
const RX_UUID='6e400003-b5a3-f393-e0a9-e50e24dcca9e';
const EMA=0.05, THR=0.5, MAXD=3;
const WB=120, TR=96;
const DEF={LF:0,RF:0,LR:0,RR:0};

function clamp(v,a,b){return Math.min(Math.max(v,a),b)}
function sign(v){return v>0?'+':''}
function tiltColor(deg,thr){
  const a=Math.abs(deg);
  if(a<=thr)return '#34d399';
  if(a<=thr*2)return '#facc15';
  return '#f87171';
}
function j2pr(j){
  const fa=(j.LF+j.RF)/2,ra=(j.LR+j.RR)/2;
  const la=(j.LF+j.LR)/2,ria=(j.RF+j.RR)/2;
  return{pitch:Math.atan((fa-ra)/WB)*(180/Math.PI),roll:Math.atan((ria-la)/TR)*(180/Math.PI)};
}
function rndJ(){return{LF:+(Math.random()*4).toFixed(1),RF:+(Math.random()*4).toFixed(1),LR:+(Math.random()*4).toFixed(1),RR:+(Math.random()*4).toFixed(1)};}
function cH(id,p,r){
  if(id==='FL')return p-r; if(id==='FR')return p+r;
  if(id==='RL')return-p-r; if(id==='RR')return-p+r; return 0;
}

function useToast(){
  const [ts,setTs]=useState([]);
  const show=useCallback((msg,type='info')=>{
    const id=Date.now();
    setTs(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setTs(t=>t.filter(x=>x.id!==id)),3000);
  },[]);
  return{ts,show};
}

// ── Corner Jack Pins ──────────────────────────────────────────────────────────
const CORNERS=[
  {id:'FL',label:'LF',x:'16%',y:'18%'},
  {id:'FR',label:'RF',x:'84%',y:'18%'},
  {id:'RL',label:'LR',x:'16%',y:'82%'},
  {id:'RR',label:'RR',x:'84%',y:'82%'},
];

function JackPin({corner,height,maxH,threshold}){
  const deficit=maxH-height;
  const isRef=deficit<0.05;
  let col,bg,bdr;
  if(isRef){col='#64748b';bg='rgba(30,41,59,0.75)';bdr='rgba(100,116,139,0.5)';}
  else if(deficit<=threshold){col='#34d399';bg='rgba(5,150,105,0.2)';bdr='rgba(52,211,153,0.6)';}
  else if(deficit<=threshold*2){col='#facc15';bg='rgba(120,83,0,0.25)';bdr='rgba(250,204,21,0.6)';}
  else{col='#f87171';bg='rgba(127,29,29,0.25)';bdr='rgba(248,113,113,0.6)';}
  return h('div',{style:{position:'absolute',left:corner.x,top:corner.y,transform:'translate(-50%,-50%)',zIndex:25,display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'}},
    !isRef&&deficit>0.05&&h('div',{className:'bounce',style:{color:col,fontSize:'11px',lineHeight:1,fontWeight:700,textShadow:'0 1px 3px rgba(0,0,0,0.9)'}},'\u25B2'),
    // Location-pin style icon (teardrop)
    h('svg',{width:32,height:38,viewBox:'0 0 32 38',style:{filter:`drop-shadow(0 2px 4px rgba(0,0,0,0.8))`}},
      h('path',{d:'M16 0C9.37 0 4 5.37 4 12c0 9 12 26 12 26S28 21 28 12C28 5.37 22.63 0 16 0z',fill:bg,stroke:bdr,strokeWidth:1.5}),
      h('text',{x:16,y:16,textAnchor:'middle',dominantBaseline:'middle',fill:col,fontSize:9,fontWeight:700,fontFamily:'Arial'},corner.label)
    ),
    !isRef&&deficit>0.05&&h('div',{style:{fontSize:'10px',fontFamily:'monospace',fontWeight:700,color:col,textShadow:'0 1px 3px rgba(0,0,0,0.9)',lineHeight:1}},
      `+${deficit.toFixed(2)}\u00B0`
    )
  );
}

// ── Bird's-Eye Bull's-Eye ─────────────────────────────────────────────────────
function RVBullsEye({pitch,roll,threshold,isLevel}){
  const SIZE=310;
  const R=SIZE/2;
  const bx=clamp(-roll/MAXD,-1,1)*(R*0.62);
  const by=clamp(pitch/MAXD,-1,1)*(R*0.62);
  const lzR=(threshold/MAXD)*(R*0.62);
  const bCol=isLevel?'#34d399':(Math.abs(pitch)<=threshold*2&&Math.abs(roll)<=threshold*2)?'#facc15':'#f87171';
  const heights=CORNERS.map(c=>({...c,h:cH(c.id,pitch,roll)}));
  const maxH=Math.max(...heights.map(c=>c.h));
  return h('div',{style:{position:'relative',width:SIZE,height:SIZE,borderRadius:'16px',overflow:'hidden',boxShadow:'0 0 0 1px rgba(30,58,95,0.6), 0 8px 40px rgba(0,0,0,0.7)'}},
    h(RVBackground),
    h('div',{style:{position:'absolute',inset:0,background:'rgba(5,8,16,0.15)'}}),
    // Jack pins
    ...heights.map(c=>h(JackPin,{key:c.id,corner:c,height:c.h,maxH,threshold})),
    // FRONT label
    h('div',{style:{position:'absolute',top:'8px',left:'50%',transform:'translateX(-50%)',zIndex:30}},
      h('div',{style:{background:'rgba(251,191,36,0.9)',borderRadius:'6px',padding:'3px 10px',border:'1px solid rgba(251,191,36,0.5)',boxShadow:'0 2px 8px rgba(0,0,0,0.5)'}},
        h('span',{style:{fontSize:'10px',fontWeight:900,color:'white',letterSpacing:'0.12em'}},'\u25B2 FRONT')
      )
    ),
    // REAR
    h('div',{style:{position:'absolute',bottom:'8px',left:'50%',transform:'translateX(-50%)',zIndex:30}},
      h('span',{style:{fontSize:'10px',fontWeight:700,color:'rgba(255,255,255,0.3)',letterSpacing:'0.1em'}},'\u25BC REAR')
    ),
    // L / R
    h('div',{style:{position:'absolute',left:'8px',top:'50%',transform:'translateY(-50%)',zIndex:30}},
      h('span',{style:{fontSize:'10px',fontWeight:700,color:'rgba(255,255,255,0.3)',letterSpacing:'0.05em'}},'\u25C4 L')
    ),
    h('div',{style:{position:'absolute',right:'8px',top:'50%',transform:'translateY(-50%)',zIndex:30}},
      h('span',{style:{fontSize:'10px',fontWeight:700,color:'rgba(255,255,255,0.3)',letterSpacing:'0.05em'}},'R \u25BA')
    ),
    // SVG overlay — rings + bubble
    h('svg',{style:{position:'absolute',inset:0,width:'100%',height:'100%'},viewBox:`${-R} ${-R} ${R*2} ${R*2}`,preserveAspectRatio:'xMidYMid meet'},
      // Outer ring
      h('circle',{cx:0,cy:0,r:R*0.80,fill:'none',stroke:'rgba(255,255,255,0.18)',strokeWidth:1.5}),
      // Mid ring
      h('circle',{cx:0,cy:0,r:R*0.52,fill:'none',stroke:'rgba(255,255,255,0.14)',strokeWidth:1.2}),
      // Level zone — green fill when level
      h('circle',{cx:0,cy:0,r:lzR,
        fill:isLevel?'rgba(52,211,153,0.18)':'rgba(52,211,153,0.07)',
        stroke:isLevel?'rgba(52,211,153,0.75)':'rgba(52,211,153,0.4)',
        strokeWidth:1.5}),
      // Crosshairs
      h('line',{x1:-R*0.80,y1:0,x2:R*0.80,y2:0,stroke:'rgba(255,255,255,0.14)',strokeWidth:1}),
      h('line',{x1:0,y1:-R*0.80,x2:0,y2:R*0.80,stroke:'rgba(255,255,255,0.14)',strokeWidth:1}),
      // Bubble shadow
      h('circle',{cx:bx+1.5,cy:by+2,r:17,fill:'rgba(0,0,0,0.55)',style:{transition:'cx 0.1s ease-out,cy 0.1s ease-out'}}),
      // Bubble body
      h('circle',{cx:bx,cy:by,r:16,
        fill:bCol,fillOpacity:isLevel?0.9:0.65,
        stroke:bCol,strokeWidth:2.5,
        style:{transition:'cx 0.1s ease-out,cy 0.1s ease-out,fill 0.3s,stroke 0.3s'}}),
      // Bubble shine
      h('circle',{cx:bx-4,cy:by-4,r:5,fill:'rgba(255,255,255,0.4)',style:{transition:'cx 0.1s ease-out,cy 0.1s ease-out'}}),
      // Center dot when level
      isLevel&&h('circle',{cx:bx,cy:by,r:4,fill:'rgba(255,255,255,0.9)'})
    )
  );
}

// ── Tilt Bar ──────────────────────────────────────────────────────────────────
function TiltBar({label,value,threshold,leftLbl,rightLbl}){
  const pct=clamp(value/MAXD,-1,1);
  const col=tiltColor(value,threshold);
  const tW=(threshold/MAXD)*50;
  return h('div',{style:{background:'rgba(13,17,23,0.7)',borderRadius:'12px',border:'1px solid rgba(30,58,95,0.5)',padding:'12px 14px'}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}},
      h('span',{style:{fontSize:'13px',color:'#94a3b8',fontWeight:500}},label),
      h('span',{style:{fontSize:'15px',fontFamily:'monospace',fontWeight:700,color:col}},`${sign(value)}${value.toFixed(2)}\u00B0`)
    ),
    h('div',{style:{position:'relative',height:'10px',borderRadius:'5px',background:'#0f1929',border:'1px solid #1e293b',overflow:'hidden'}},
      // Level zone
      h('div',{style:{position:'absolute',top:0,bottom:0,background:'rgba(52,211,153,0.15)',borderLeft:'1px solid rgba(52,211,153,0.25)',borderRight:'1px solid rgba(52,211,153,0.25)',left:`${50-tW}%`,width:`${tW*2}%`}}),
      // Center tick
      h('div',{style:{position:'absolute',top:0,bottom:0,left:'50%',width:'1px',background:'rgba(100,116,139,0.4)'}}),
      // Indicator dot
      h('div',{style:{position:'absolute',top:'1px',bottom:'1px',width:'8px',borderRadius:'4px',background:col,left:`calc(50% + ${pct*44}% - 4px)`,transition:'left 0.1s ease-out,background 0.3s'}})
    ),
    h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'10px',color:'#334155',marginTop:'4px'}},
      h('span',null,leftLbl),h('span',null,rightLbl)
    )
  );
}

function JackDemoControls({jacks,onChange,onReset,onRandom}){
  return h('div',{style:{background:'rgba(13,17,23,0.7)',borderRadius:'14px',border:'1px solid rgba(251,191,36,0.2)',padding:'14px'}},

        h('button',{onClick:onRandom,style:{padding:'4px 10px',borderRadius:'6px',border:'1px solid #334155',background:'transparent',fontSize:'11px',color:'#94a3b8',cursor:'pointer'}},'Random'),

      )

    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}},

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const {ts,show:toast}=useToast();
  const [connecting,setConnecting]=useState(false);
  const [connected,setConnected]=useState(false);
  const [devName,setDevName]=useState('');
  const txRef=useRef(null),devRef=useRef(null);
  const epRef=useRef(null),erRef=useRef(null);
  const lpoRef=useRef(0),lroRef=useRef(0);
  const [pitch,setPitch]=useState(0);
  const [roll,setRoll]=useState(0);
  const [demo,setDemo]=useState(false);
  const [jacks,setJacks]=useState(DEF);
  const [simActive,setSim]=useState(false);
  const [simP,setSimP]=useState(0);
  const simRef=useRef(null);

  const jTilt=useMemo(()=>j2pr(jacks),[jacks]);
  const dPitch=demo?jTilt.pitch:simActive?simP:pitch;
  const dRoll=demo?jTilt.roll:simActive?0:roll;
  const isLevel=Math.abs(dPitch)<=THR&&Math.abs(dRoll)<=THR;

  const toggleSim=useCallback(()=>{
    if(simActive){clearInterval(simRef.current);setSim(false);setSimP(0);}
    else{setDemo(false);setSim(true);const t0=Date.now();
      simRef.current=setInterval(()=>{const t=(Date.now()-t0)/1000;setSimP(+(Math.sin(t*0.6)*2.5).toFixed(2));},40);}
  },[simActive]);
  useEffect(()=>()=>clearInterval(simRef.current),[]);

  const send=useCallback(async cmd=>{if(!txRef.current)return;try{await txRef.current.writeValue(new TextEncoder().encode(cmd+'\n'));}catch(_){}},[]);
  const onData=useCallback(e=>{
    const v=new TextDecoder().decode(e.target.value).trim();
    const m=v.match(/P:([-\d.]+),R:([-\d.]+)/);
    if(!m)return;
    const rp=parseFloat(m[1]),rr=parseFloat(m[2]);
    if(epRef.current===null){epRef.current=rp;erRef.current=rr;}
    else{epRef.current=EMA*rp+(1-EMA)*epRef.current;erRef.current=EMA*rr+(1-EMA)*erRef.current;}
    setPitch(+(epRef.current-lpoRef.current).toFixed(2));
    setRoll(+(erRef.current-lroRef.current).toFixed(2));
  },[]);
  const onDisc=useCallback(()=>{setConnected(false);txRef.current=null;epRef.current=null;erRef.current=null;lpoRef.current=0;lroRef.current=0;toast('Disconnected');},[toast]);
  const connect=useCallback(async()=>{
    if(!navigator.bluetooth){toast('Web Bluetooth requires Chrome','error');return;}
    setConnecting(true);
    try{
      const d=await navigator.bluetooth.requestDevice({filters:[{services:[SERVICE_UUID]}],optionalServices:[SERVICE_UUID]});
      d.addEventListener('gattserverdisconnected',onDisc);devRef.current=d;
      let s;for(let i=1;i<=3;i++){try{s=await d.gatt.connect();break;}catch(e){if(i===3)throw e;await new Promise(r=>setTimeout(r,1000));}}
      const svc=await s.getPrimaryService(SERVICE_UUID);
      txRef.current=await svc.getCharacteristic(TX_UUID);
      try{const rx=await svc.getCharacteristic(RX_UUID);await rx.startNotifications();rx.addEventListener('characteristicvaluechanged',onData);}catch(_){}
      setDevName(d.name||'Level');setConnected(true);setSim(false);setDemo(false);
      toast(`Connected to ${d.name||'Level'}`,'success');
    }catch(e){if(e.name!=='NotFoundError')toast('Connection failed: '+e.message,'error');}
    setConnecting(false);
  },[onData,onDisc,toast]);
  const disconnect=useCallback(()=>{if(devRef.current?.gatt?.connected)devRef.current.gatt.disconnect();setConnected(false);txRef.current=null;},[]);

  const sc=connected?'#34d399':(simActive||demo)?'#c084fc':'#334155';
  const sl=connected?devName:simActive?'Auto demo':demo?'Jack demo':'Not connected';

  return h(React.Fragment,null,
    h('div',{style:{minHeight:'100vh',background:'linear-gradient(160deg,#0d1117,#0a0f1e,#0d1117)',paddingBottom:'2rem'}},

      // Header
      h('header',{style:{position:'sticky',top:0,zIndex:50,background:'rgba(13,17,23,0.9)',backdropFilter:'blur(12px)',borderBottom:'1px solid rgba(30,58,95,0.4)'}},
        h('div',{style:{maxWidth:'400px',margin:'0 auto',padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}},
          h('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},
            // RV icon
            h('svg',{width:30,height:20,viewBox:'0 0 30 20',fill:'none'},
              h('rect',{x:5,y:2,width:23,height:16,rx:3,stroke:'#fbbf24',strokeWidth:1.5}),
              h('rect',{x:5,y:5,width:7,height:10,rx:2,stroke:'#fbbf24',strokeWidth:1}),
              h('circle',{cx:10,cy:19,r:2,fill:'#fbbf24',opacity:0.7}),
              h('circle',{cx:22,cy:19,r:2,fill:'#fbbf24',opacity:0.7}),
              h('line',{x1:0,y1:10,x2:5,y2:10,stroke:'#fbbf24',strokeWidth:1.5})
            ),
            h('div',null,
              h('h1',{style:{fontSize:'14px',fontWeight:700,color:'white',margin:0,lineHeight:1}},'Digital Level 1 RV'),
              h('p',{style:{fontSize:'10px',color:'#475569',margin:0,marginTop:'2px',lineHeight:1}},'MPU-6050 \u00B7 ESP32 \u00B7 BLE \u00B7 v1.1')
            )
          ),
          h('div',{style:{display:'flex',alignItems:'center',gap:'5px',padding:'4px 10px',borderRadius:'20px',border:`1px solid ${sc}40`,background:`${sc}12`,fontSize:'11px',fontWeight:500,color:sc}},
            h('span',{style:{width:'6px',height:'6px',borderRadius:'50%',background:sc,display:'inline-block'}}),
            sl
          )
        )
      ),

      h('main',{style:{maxWidth:'400px',margin:'0 auto',padding:'16px',display:'flex',flexDirection:'column',gap:'12px'}},

        // BLE Card
        h('div',{style:{background:'rgba(13,17,23,0.6)',borderRadius:'16px',border:'1px solid rgba(30,58,95,0.5)',padding:'14px'}},
          h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
            h('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},
              h('div',{style:{width:'36px',height:'36px',borderRadius:'50%',background:connected?'rgba(52,211,153,0.2)':'rgba(30,41,59,0.6)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px'}},
                connected?'\uD83D\uDCF6':'\uD83D\uDCF5'
              ),
              h('div',null,
                h('p',{style:{fontSize:'13px',fontWeight:600,color:'white',margin:0}},connected?devName:'Not Connected'),
                h('p',{style:{fontSize:'11px',color:'#475569',margin:0}},connected?'BLE connected \u00B7 streaming tilt data':'Tap Connect to pair via BLE')
              )
            ),
            h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},
              // Auto-sweep button
              h('button',{onClick:toggleSim,disabled:connected,title:simActive?'Stop':'Auto sweep',style:{width:'30px',height:'30px',borderRadius:'8px',border:`1px solid ${simActive?'rgba(192,132,252,0.5)':'#1e293b'}`,background:simActive?'rgba(192,132,252,0.2)':'rgba(15,25,41,0.6)',color:simActive?'#c084fc':'#475569',cursor:connected?'not-allowed':'pointer',opacity:connected?0.3:1,display:'flex',alignItems:'center',justifyContent:'center'}},
                simActive
                  ? h('svg',{width:14,height:14,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2},h('rect',{x:6,y:6,width:12,height:12,rx:1}))
                  : h('svg',{width:14,height:14,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2},h('polygon',{points:'5,3 19,12 5,21'}))
              ),
              // Jack demo button
              h('button',{onClick:()=>{setDemo(d=>{if(!d){setSim(false);clearInterval(simRef.current);setSimP(0);}return!d;});setJacks(rndJ());},style:{padding:'5px 8px',borderRadius:'8px',border:`1px solid ${demo?'rgba(251,191,36,0.4)':'#1e293b'}`,background:demo?'rgba(251,191,36,0.15)':'rgba(15,25,41,0.6)',color:demo?'#fbbf24':'#475569',fontSize:'11px',fontWeight:600,cursor:'pointer'}},
                demo?'\u25A0 Jacks':'Jacks'
              ),
              // Connect
              h('button',{onClick:connected?disconnect:connect,disabled:connecting,style:{padding:'6px 12px',borderRadius:'8px',background:connected?'#1e293b':'#059669',color:'white',fontSize:'12px',fontWeight:700,border:'none',cursor:connecting?'not-allowed':'pointer',opacity:connecting?0.5:1,display:'flex',alignItems:'center',gap:'4px'}},
                connecting?h('svg',{className:'spin',width:14,height:14,viewBox:'0 0 24 24',fill:'none'},h('circle',{cx:12,cy:12,r:10,stroke:'currentColor',strokeWidth:4,opacity:0.25}),h('path',{d:'M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z',fill:'currentColor',opacity:0.75})):null,
                connected?'Disconnect':connecting?'Scanning\u2026':'Connect'
              )
            )
          )
        ),

        // Level Banner
        h('div',{style:{borderRadius:'14px',border:`1px solid ${isLevel?'rgba(52,211,153,0.5)':'rgba(251,191,36,0.3)'}`,background:isLevel?'rgba(5,150,105,0.15)':'rgba(92,64,0,0.15)',padding:'14px 20px',display:'flex',alignItems:'center',justifyContent:'center',gap:'10px',transition:'all 0.3s'}},
          isLevel
            ? h(React.Fragment,null,
                h('svg',{width:22,height:22,viewBox:'0 0 24 24',fill:'none',stroke:'#34d399',strokeWidth:2.5},h('path',{strokeLinecap:'round',strokeLinejoin:'round',d:'M5 13l4 4L19 7'})),
                h('p',{style:{fontSize:'17px',fontWeight:800,letterSpacing:'0.15em',color:'#34d399',margin:0}},'\u2713  LEVEL'))
            : h(React.Fragment,null,
                h('svg',{width:22,height:22,viewBox:'0 0 24 24',fill:'none',stroke:'#fbbf24',strokeWidth:2},h('path',{strokeLinecap:'round',strokeLinejoin:'round',d:'M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z'})),
                h('p',{style:{fontSize:'17px',fontWeight:800,letterSpacing:'0.12em',color:'#fbbf24',margin:0}},'ADJUST NEEDED'))
        ),

        // Bird's-Eye
        h('div',{style:{display:'flex',justifyContent:'center'}},
          h(RVBullsEye,{pitch:dPitch,roll:dRoll,threshold:THR,isLevel})
        ),

        // Tilt Bars
        h(TiltBar,{label:'Front / Back',value:dPitch,threshold:THR,leftLbl:'Nose Low',rightLbl:'Nose High'}),
        h(TiltBar,{label:'Left / Right',value:dRoll,threshold:THR,leftLbl:'Lean Left',rightLbl:'Lean Right'}),

        // Jack Demo Controls
        demo&&h(JackDemoControls,{jacks,onChange:(k,v)=>setJacks(j=>({...j,[k]:v})),onReset:()=>setJacks(DEF),onRandom:()=>setJacks(rndJ())}),

        // Tare
        h('button',{
          onClick:()=>{
            if(connected){
              lpoRef.current+=pitch;lroRef.current+=roll;
              setPitch(0);setRoll(0);
              send(`TAR:${pitch.toFixed(2)},${roll.toFixed(2)}`);
              toast('Tared \u2014 display zeroed');
            }else toast('Not connected \u2014 tare not applied');
          },
          style:{width:'100%',padding:'13px',borderRadius:'14px',border:'1px solid rgba(251,191,36,0.35)',background:'rgba(251,191,36,0.1)',color:'#fbbf24',fontSize:'14px',fontWeight:700,cursor:'pointer',transition:'all 0.2s'}
        },'Tare to Current Position'),

        // Footer
        h('div',{style:{textAlign:'center',fontSize:'11px',color:'#1e3a5f',paddingTop:'4px'}},
          h('p',{style:{margin:0}},'Arduino Nano ESP32 + MPU-6050 \u00B7 BLE Nordic UART'),
          h('p',{style:{margin:'3px 0 0'}},'Level tolerance \u00B1'+THR.toFixed(1)+'\u00B0 \u00B7 \u00A9 Digital Level 1 RV \u00B7 v1.1')
        )
      )
    ),
    // Toasts
    h('div',{style:{position:'fixed',bottom:'1.5rem',left:'50%',transform:'translateX(-50%)',zIndex:1000,display:'flex',flexDirection:'column',gap:'8px',alignItems:'center',pointerEvents:'none'}},
      ts.map(t=>h('div',{key:t.id,className:'toast-in',style:{padding:'8px 18px',borderRadius:'20px',fontSize:'13px',fontWeight:500,boxShadow:'0 4px 20px rgba(0,0,0,0.5)',background:t.type==='error'?'rgba(239,68,68,0.92)':t.type==='success'?'rgba(16,185,129,0.92)':'rgba(30,41,59,0.96)',color:'white'}},t.msg))
    )
  );
}

if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
